<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vorsink | sign-up Page</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="icon" type="image/png" sizes="32x32" href="../img/logo-brwoser.png">

<link rel="apple-touch-icon" sizes="180x180" href="../img/logo-brwoser.png">

<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">

<link rel="manifest" href="/site.webmanifest">

<meta name="theme-color" content="#ffb907">
    <link rel="stylesheet" href="sign-in.css" />
  </head>
  <body>
    <header>
      <a href="../Makeit.Home/index.html4" class="logo">
        <img src="../img/Vorsink.png" alt="Makeit Logo" />
      </a>
      <nav class="nav">
        <a href="../VORSINK.Home/index.html">Back-to-Home</a>
      </nav>
    </header>

    <main class="login-container">
      <div class="login-card">
        <div class="form-header">
          <h2>Join <b class="Makeit">Vorsink</b></h2>
          <p>Fight <b class="Makeit">Vorsink</b>.</p>
        </div>

        <form id="signupForm" class="login-form">
          <div class="input-group">
            <input type="text" placeholder="Full Name" required />
            <input type="email" placeholder="Email Address" required />
            <div class="input-row">
              <input type="password" placeholder="Password" required />
              <input type="password" placeholder="Confirm" required />
            </div>
          </div>

          <p class="role-label">I am joining as a:</p>
          <div class="role-options">
            <div
              class="role-box"
              id="role-investor"
              onclick="setRole('investor')"
            >
              <i class="fas fa-briefcase"></i>
              <span>Investor</span>
            </div>
            <div
              class="role-box"
              id="role-founder"
              onclick="setRole('founder')"
            >
              <i class="fas fa-lightbulb"></i>
              <span>Founder</span>
            </div>
            <div class="role-box" id="role-maker" onclick="setRole('maker')">
              <i class="fas fa-tools"></i>
              <span>Maker</span>
            </div>
          </div>

          <div class="form-options">
            <label>
              <input type="checkbox" required /> I agree to the
              <a href="#" class="forgot-link">Terms</a>
            </label>
          </div>

          <button type="submit" class="btn-main">Create Account</button>

          <p class="signup-text">
            Already a member? <a href="../login/login.html">Log In</a>
          </p>
        </form>
      </div>
    </main>

    <canvas id="canvas"></canvas>

    <script src="sign-in.js"></script>
  </body>
</html>
